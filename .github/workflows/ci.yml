# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.


name: CI

on:
  push:
    branches:
      - main
      - Mahdi_dev
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Start database
        run: docker compose up -d

      - name: Wait for database
        run: |
          sleep 20
          docker compose ps

      - name: Run backend tests
        working-directory: backend
        run: mvn test

      - name: Stop database
        if: always()
        run: docker compose down -v

  e2e-cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend test dependencies
        run: |
          npm install
          npm install -D http-server wait-on

      - name: Start database
        run: docker compose up -d

      - name: Wait for database
        run: |
          sleep 20
          docker compose ps

      - name: Start backend
        working-directory: backend
        run: mvn spring-boot:run > ../backend.log 2>&1 &

      - name: Start frontend server
        run: npx http-server frontend -p 5501 > frontend.log 2>&1 &

      - name: Wait for backend and frontend
        run: npx wait-on tcp:127.0.0.1:8080 http://127.0.0.1:5501/index.html --timeout 120000

      - name: Run Cypress tests
        run: npx cypress run

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: |
            backend.log
            frontend.log

      - name: Stop database
        if: always()
        run: docker compose down -v
